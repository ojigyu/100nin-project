<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小島の100人プロジェクト</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f8f6f1;
      color: #222;
      line-height: 1.8;
    }
    header {
      background: white;
      padding: 60px 20px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    section {
      background: white;
      margin-bottom: 24px;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    a.button {
      display: inline-block;
      background: #d97706;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>小島の100人プロジェクト</h1>
    <p>100人の人に会って話を聴き、学びを深め、講演や教育活動につなげていくプロジェクトです。</p>
  </header>

  <main>
    <section>
      <h2>これは公開テストページです</h2>
      <p>
        まずはホームページをインターネット上で見られる状態にするため、
        最初のファイルを作っています。
      </p>
      <p>
        ここから少しずつ、
        トップページ・プロフィール・できること・出会った人一覧
        を整えていきます。
      </p>
      <a class="button" href="#">話してみる</a>
    </section>
  </main>
</body>
</html>
